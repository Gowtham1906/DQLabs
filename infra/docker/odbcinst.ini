# ODBC Driver Registration – Docker-specific paths
# (MWAA version is at repo root/odbcinst.ini – do NOT use that here)

[ODBC Driver 17 for SQL Server]
Description=Microsoft ODBC Driver 17 for SQL Server
Driver=/opt/microsoft/msodbcsql17/lib64/libmsodbcsql-17.so
UsageCount=1

[DenodoODBCDriver]
Description=ODBC driver of Denodo
Driver=/opt/denodo/denodo-vdp-odbcdriver-linux/lib/unixodbc_x64/denodoodbc.so
UsageCount=1
