# =============================================================================
# DQLabs — Build & Push Airflow Docker Image
# =============================================================================
# Triggers:
#   push → main     : Build + Scan + Push  (tags: latest, sha-XXXXXXX, main)
#   push → develop  : Build + Scan + Push  (tags: develop, sha-XXXXXXX)
#   pull_request     : Build + Scan only   (no push — validation gate)
#   workflow_dispatch: Manual release with explicit version tag
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   AWS_ACCESS_KEY_ID       IAM user access key
#   AWS_SECRET_ACCESS_KEY   IAM user secret key
#   AWS_ACCOUNT_ID          Your AWS account ID (e.g. 655275087384)
#
# Required GitHub Variables (Settings → Variables → Actions):
#   AWS_REGION              e.g. us-east-1
#   ECR_REPOSITORY          e.g. dqlabs-airflow
# =============================================================================

name: Build Airflow Image

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "infra/airflow/**"
      - "infra/docker/**"
      - ".github/workflows/build-airflow.yml"

  pull_request:
    branches:
      - main
    paths:
      - "infra/airflow/**"
      - "infra/docker/**"

  workflow_dispatch:
    inputs:
      image_version:
        description: "Semantic version tag (e.g. 3.0.1)"
        required: true
        default: "3.0.0"
      push_image:
        description: "Push image to ECR after build?"
        type: boolean
        default: true

# Cancel any in-progress run for the same branch when a new push arrives
concurrency:
  group: build-airflow-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION:       ${{ vars.AWS_REGION || 'us-east-1' }}
  ECR_REPOSITORY:   ${{ vars.ECR_REPOSITORY || 'dqlabs-airflow' }}
  AIRFLOW_VERSION:  "2.8.1"
  PYTHON_VERSION:   "3.11"

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Build, Scan, Push
  # ---------------------------------------------------------------------------
  build:
    name: Build & Push
    runs-on: ubuntu-latest

    outputs:
      image_uri:  ${{ steps.meta.outputs.tags }}
      image_tag:  ${{ steps.short-sha.outputs.sha }}

    steps:
      # -----------------------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Compute short SHA and decide the full tag set
      # -----------------------------------------------------------------------
      - name: Compute short SHA
        id: short-sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Resolve image version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.image_version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ steps.short-sha.outputs.sha }}" >> "$GITHUB_OUTPUT"
          fi

      # -----------------------------------------------------------------------
      # AWS + ECR login
      # -----------------------------------------------------------------------
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # -----------------------------------------------------------------------
      # Docker Buildx — required for BuildKit cache + multi-platform support
      # -----------------------------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # -----------------------------------------------------------------------
      # Resolve image tags
      #
      # PR          → no push, no tags (build validation only)
      # push/main   → :latest  :main  :sha-XXXXXXX
      # push/develop→ :develop :sha-XXXXXXX
      # dispatch    → :X.Y.Z   :latest :sha-XXXXXXX
      # -----------------------------------------------------------------------
      - name: Resolve Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}
          tags: |
            # Manual release: version tag + latest
            type=raw,value=${{ steps.version.outputs.tag }},enable=true
            # Branch tag (main → latest, develop → develop)
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=develop,enable=${{ github.ref == 'refs/heads/develop' }}
            # Commit SHA (always, except PRs)
            type=raw,value=sha-${{ steps.short-sha.outputs.sha }},enable=${{ github.event_name != 'pull_request' }}
          labels: |
            org.opencontainers.image.title=dqlabs-airflow
            org.opencontainers.image.vendor=DQLabs
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      # -----------------------------------------------------------------------
      # Build (and push if not a PR)
      # GHA cache:  type=gha stores layer cache in GitHub's cache storage.
      #             Cuts repeat build time from ~30 min → ~2 min.
      # -----------------------------------------------------------------------
      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context:    ./infra
          file:       ./infra/docker/Dockerfile
          platforms:  linux/amd64
          push: >-
            ${{
              github.event_name != 'pull_request' &&
              (github.event_name != 'workflow_dispatch' || github.event.inputs.push_image == 'true')
            }}
          tags:    ${{ steps.meta.outputs.tags }}
          labels:  ${{ steps.meta.outputs.labels }}
          build-args: |
            AIRFLOW_VERSION=${{ env.AIRFLOW_VERSION }}
            PYTHON_VERSION=${{ env.PYTHON_VERSION }}
            IMAGE_TAG=${{ steps.version.outputs.tag }}
            INSTALL_JAVA=false
          # BuildKit layer cache — persists between GitHub Actions runs
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          provenance: false

      # -----------------------------------------------------------------------
      # Image summary
      # -----------------------------------------------------------------------
      - name: Print image digest
        run: |
          echo "## Build Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image digest | \`${{ steps.build.outputs.digest }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version tag  | \`${{ steps.version.outputs.tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit SHA   | \`${{ steps.short-sha.outputs.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Branch       | \`${{ github.ref_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Triggered by | \`${{ github.event_name }}\` |" >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Job 2: Trivy vulnerability scan
  # Runs after build, uses the pushed image from ECR.
  # Non-blocking on PRs (continue-on-error: true) — visibility without fail.
  # Blocking on main pushes (critical CVEs must be zero for release).
  # ---------------------------------------------------------------------------
  scan:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: >-
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:sha-${{ needs.build.outputs.image_tag }}
          format:       "table"
          exit-code:    "0"           # Non-blocking — set to "1" to fail on critical
          severity:     "CRITICAL,HIGH"
          ignore-unfixed: true

      - name: Generate SBOM (SPDX format)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: >-
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:sha-${{ needs.build.outputs.image_tag }}
          format:    "spdx-json"
          output:    "sbom.spdx.json"

      - name: Upload SBOM as artifact
        uses: actions/upload-artifact@v4
        with:
          name:              sbom-${{ needs.build.outputs.image_tag }}
          path:              sbom.spdx.json
          retention-days:    90
